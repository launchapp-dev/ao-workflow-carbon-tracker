framework: "Science Based Targets initiative (SBTi)"
pathway: "1.5°C aligned"
validation_date: "2024-01-15"
commitment_letter: "SBTi-GFC-2024-0142"

base_year: 2023
base_year_emissions:
  scope_1: 12500    # tCO2e
  scope_2: 18000    # tCO2e
  scope_3: 14500    # tCO2e
  total: 45000      # tCO2e

near_term_target:
  year: 2030
  scope_1_2_reduction_pct: 42    # % reduction from base year
  scope_3_reduction_pct: 25      # % reduction from base year
  description: "Reduce absolute Scope 1 and 2 GHG emissions 42% by 2030 from a 2023 base year.
    Reduce absolute Scope 3 GHG emissions 25% by 2030 from a 2023 base year."

long_term_target:
  year: 2050
  description: "Achieve net-zero GHG emissions across the value chain by 2050."

