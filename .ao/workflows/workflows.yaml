default_workflow_ref: calculate-footprint

workflows:
  - id: ingest-emissions-data
    name: "Ingest Emissions Data"
    description: "Collect and validate monthly emissions source data from raw files"
    phases:
      - parse-source-files
      - validate-and-store

  - id: calculate-footprint
    name: "Calculate Carbon Footprint"
    description: "Calculate Scope 1/2/3 emissions, benchmark against targets, and generate monthly summary"
    phases:
      - aggregate-activity-data
      - calculate-emissions
      - benchmark-against-targets:
          on_verdict:
            on-track:
              target: generate-monthly-summary
            behind-target:
              target: generate-monthly-summary
            critical-overshoot:
              target: generate-monthly-summary
      - generate-monthly-summary
    post_success:
      merge:
        strategy: squash
        target_branch: main
        create_pr: false
        auto_merge: false
        cleanup_worktree: true

  - id: reduction-planning
    name: "Emission Reduction Planning"
    description: "Identify and prioritize emission reduction opportunities for the quarter"
    phases:
      - analyze-hotspots
      - find-opportunities
      - evaluate-feasibility:
          on_verdict:
            sufficient:
              target: compile-reduction-plan
            insufficient:
              target: find-opportunities
          max_rework_attempts: 3
      - compile-reduction-plan

  - id: quarterly-report
    name: "Quarterly Sustainability Report"
    description: "Produce comprehensive quarterly emissions report and progress assessment"
    phases:
      - aggregate-quarterly-data
      - compile-disclosure
      - assess-progress
      - generate-quarterly-report

  - id: anomaly-detection
    name: "Weekly Anomaly Detection"
    description: "Scan emissions data for anomalies, spikes, and coverage gaps"
    phases:
      - detect-anomalies
